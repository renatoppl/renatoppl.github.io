<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYSTEM TERMINAL</title>
<style>
  :root{
    --case:      #cfcdbd;   /* putty beige */
    --case-dark: #a8a695;
    --case-deep: #8b897a;
    --bezel:     #b8b6a6;
    --screen-bg: #1a1d3a;   /* dark navy CRT */
    --phosphor:  #4ade60;   /* green glow */
    --phosphor-dim: #2b8c3c;
    --table:     #d8d5cc;
    --line:      #3a3a32;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  body{
    min-height:100vh;
    background:
      repeating-linear-gradient(90deg, transparent 0 120px, rgba(0,0,0,.03) 120px 122px),
      var(--table);
    display:flex; align-items:center; justify-content:center;
    padding:24px;
    font-family:"Courier New", monospace;
  }

  .computer{ width:min(780px, 96vw); user-select:none; }

  /* ---------- top antenna / status block ---------- */
  .top-block{
    width:34%; margin:0 auto;
    background:linear-gradient(#b4b2a2,#9d9b8b);
    border:3px solid var(--line);
    border-bottom:none;
    border-radius:8px 8px 0 0;
    padding:8px 14px;
    display:flex; gap:8px; align-items:center; justify-content:center;
  }
  .chiclet{ width:14px; height:11px; border:2px solid var(--line); border-radius:2px; }
  .dot{ width:12px; height:12px; border:2px solid var(--line); border-radius:50%; }
  .r{background:#c0392b} .g{background:#27ae60} .y{background:#e2b13c} .o{background:#d35400}
  .lit{ box-shadow:0 0 6px 1px currentColor; }

  /* ---------- monitor ---------- */
  .monitor{
    background:linear-gradient(160deg, #d6d4c4, var(--case) 40%, var(--case-dark));
    border:3px solid var(--line);
    border-radius:18px;
    padding:18px;
    position:relative;
    box-shadow: inset 0 -8px 0 rgba(0,0,0,.08), 6px 10px 0 rgba(0,0,0,.12);
  }

  .bezel{
    background:var(--bezel);
    border:3px solid var(--line);
    border-radius:24px;
    padding:14px;
  }

  .screen{
    position:relative;
    background:radial-gradient(ellipse at 50% 45%, #232858 0%, var(--screen-bg) 70%, #111430 100%);
    border:3px solid var(--line);
    border-radius:34px / 30px;
    height:340px;
    overflow:hidden;
    cursor:text;
    box-shadow: inset 0 0 40px rgba(0,0,0,.65);
  }
  /* scanlines + vignette + glass glare */
  .screen::before{
    content:""; position:absolute; inset:0; pointer-events:none; z-index:3;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.16) 0 2px, transparent 2px 4px);
    border-radius:inherit;
  }
  .screen::after{
    content:""; position:absolute; inset:0; pointer-events:none; z-index:4;
    background:
      radial-gradient(ellipse at 28% 12%, rgba(255,255,255,.10), transparent 40%),
      radial-gradient(ellipse at 50% 50%, transparent 60%, rgba(0,0,0,.45) 100%);
    border-radius:inherit;
  }
  @keyframes flicker{
    0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:.92} 94%{opacity:1} 97%{opacity:.96} 98%{opacity:1}
  }
  .phosphor-layer{
    position:absolute; inset:0; z-index:2;
    padding:26px 30px;
    overflow:hidden;
    animation:flicker 6s infinite;
  }
  @media (prefers-reduced-motion: reduce){
    .phosphor-layer{ animation:none; }
  }

  #output{
    height:100%;
    color:var(--phosphor);
    font-family:"Courier New", monospace;
    font-size:clamp(13px, 2.4vw, 17px);
    font-weight:bold;
    line-height:1.55;
    letter-spacing:1px;
    white-space:pre-wrap;
    word-break:break-all;
    text-shadow:0 0 6px var(--phosphor), 0 0 14px rgba(74,222,96,.45);
  }
  .cursor{
    display:inline-block;
    width:.65em; height:1.05em;
    background:var(--phosphor);
    vertical-align:text-bottom;
    box-shadow:0 0 8px var(--phosphor);
    animation:blink 1s steps(1) infinite;
  }
  @keyframes blink{ 50%{opacity:0} }

  /* hidden input that captures mobile keyboards too */
  #kb{
    position:absolute; opacity:0; left:-9999px; top:0;
    width:1px; height:1px;
  }

  .neck{
    width:46%; height:22px; margin:0 auto;
    background:linear-gradient(#b6b4a4,#9a9888);
    border:3px solid var(--line); border-top:none;
  }

  /* ---------- keyboard unit ---------- */
  .deck{
    background:linear-gradient(170deg, #d2d0c0, var(--case-dark));
    border:3px solid var(--line);
    border-radius:10px 10px 14px 14px;
    padding:14px 18px 20px;
    transform:perspective(800px) rotateX(9deg);
    transform-origin:top center;
    box-shadow:0 18px 0 -6px var(--case-deep), 0 22px 0 -6px var(--line);
  }
  .deck-controls{
    display:flex; gap:18px; align-items:center; justify-content:space-between;
    border:2px solid var(--line); border-radius:6px;
    background:#b9b7a7;
    padding:7px 12px; margin-bottom:16px;
    box-shadow:inset 0 3px 4px rgba(0,0,0,.18);
  }
  .ctl-group{ display:flex; gap:7px; }

  .keys{ display:flex; flex-direction:column; gap:11px; }
  .krow{ display:flex; gap:6px; }

  /*  3D extruded keycaps: lighter top face + darker front face
      drawn with stacked box-shadows, sitting proud of the deck  */
  .key{
    --side:#b3ad95;            /* front-face color per key type */
    flex:1; height:25px;
    background:linear-gradient(178deg, #f7f3e2 0%, #e8e3cc 60%, #d6d0b8 100%);
    border:2px solid var(--line);
    border-radius:5px 5px 3px 3px;
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,.65),   /* top highlight        */
      0 6px 0 -1px var(--side),              /* extruded front face  */
      0 8px 0 -1px var(--line),              /* front-face outline   */
      0 11px 5px rgba(0,0,0,.22);            /* drop shadow on deck  */
    font-family:"Courier New",monospace; font-size:9px; font-weight:bold;
    color:#4a4a40;
    display:flex; align-items:center; justify-content:center;
    transition:transform .06s, box-shadow .06s;
  }
  .key.mod{
    --side:#5f5d4f;
    background:linear-gradient(178deg, #a8a695 0%, #93917f 60%, #807e6d 100%);
    color:#2d2d26;
  }
  .key.accent{
    --side:#8c6a2b;
    background:linear-gradient(178deg, #e8c47e 0%, #d4a85c 60%, #bf9347 100%);
  }
  .key.esc{
    --side:#6e1f17;
    background:linear-gradient(178deg, #d4493a 0%, #b53a2c 60%, #9c3024 100%);
    color:#f5e6e3;
  }
  .key.w15{ flex:1.5 } .key.w2{ flex:2 } .key.w6{ flex:6.5 }
  .key.pressed{
    transform:translateY(6px);
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,.35),
      0 1px 0 -1px var(--side),
      0 2px 0 -1px var(--line),
      0 3px 2px rgba(0,0,0,.2);
  }

  .hint{
    text-align:center; margin-top:14px;
    font-size:11px; letter-spacing:2px; text-transform:uppercase;
    color:#7a786a;
  }

  /* ===================== EMERGENCY ALARM ===================== */
  /* full-viewport red strobe coming "from" the machine */
  #alarm-flash{
    position:fixed; inset:0; pointer-events:none; z-index:60;
    opacity:0;
    background:
      radial-gradient(circle at 50% 50%, transparent 25%, rgba(180,12,12,.45) 70%, rgba(120,0,0,.75) 100%);
  }
  body.alarm{ animation:bodyred .6s steps(1) infinite; }
  body.alarm #alarm-flash{ animation:alarmflash .6s steps(1) infinite; }

  /* screen glows red and the phosphor text turns alarm-red */
  body.alarm .screen{ animation:screenred .6s steps(1) infinite; }
  body.alarm #output{
    color:#ff4d4d !important;
    text-shadow:0 0 6px #ff2a2a, 0 0 16px rgba(255,0,0,.5) !important;
  }
  body.alarm .cursor{ background:#ff4d4d; box-shadow:0 0 8px #ff2a2a; }

  /* every indicator light blares red */
  body.alarm .dot, body.alarm .chiclet{
    background:#c0392b !important;
    animation:ledblare .3s steps(1) infinite;
  }
  /* the monitor bezel pulses red too */
  body.alarm .monitor{ animation:caseflash .6s steps(1) infinite; }

  @keyframes alarmflash{ 0%,49%{opacity:0} 50%,100%{opacity:.92} }
  @keyframes bodyred{
    0%,49%{ background-color:var(--table) }
    50%,100%{ background-color:#3a0d0d }
  }
  @keyframes screenred{
    0%,49%{ box-shadow:inset 0 0 40px rgba(0,0,0,.65) }
    50%,100%{ box-shadow:inset 0 0 90px rgba(220,20,20,.85) }
  }
  @keyframes ledblare{
    0%,49%{ opacity:.35; box-shadow:none }
    50%,100%{ opacity:1; box-shadow:0 0 10px 3px #ff2a2a }
  }
  @keyframes caseflash{
    0%,49%{ box-shadow: inset 0 -8px 0 rgba(0,0,0,.08), 6px 10px 0 rgba(0,0,0,.12) }
    50%,100%{ box-shadow: inset 0 -8px 0 rgba(0,0,0,.08), 6px 10px 0 rgba(0,0,0,.12), 0 0 36px 6px rgba(220,20,20,.8) }
  }
  /* respect reduced-motion: hold a steady red alert instead of strobing */
  @media (prefers-reduced-motion: reduce){
    body.alarm, body.alarm #alarm-flash, body.alarm .screen,
    body.alarm .dot, body.alarm .chiclet, body.alarm .monitor{ animation:none; }
    body.alarm{ background-color:#3a0d0d; }
    body.alarm #alarm-flash{ opacity:.8; }
    body.alarm .dot, body.alarm .chiclet{ box-shadow:0 0 8px 2px #ff2a2a; }
  }

  /* after blaring for a few seconds: stop blinking, hold a steady red */
  body.alarm.alarm-steady,
  body.alarm.alarm-steady #alarm-flash,
  body.alarm.alarm-steady .screen,
  body.alarm.alarm-steady .dot,
  body.alarm.alarm-steady .chiclet,
  body.alarm.alarm-steady .monitor{ animation:none !important; }
  body.alarm.alarm-steady{ background-color:#3a0d0d; }
  body.alarm.alarm-steady #alarm-flash{ opacity:.7; }
  body.alarm.alarm-steady .screen{ box-shadow:inset 0 0 90px rgba(220,20,20,.7); }
  body.alarm.alarm-steady .dot,
  body.alarm.alarm-steady .chiclet{ opacity:1; box-shadow:0 0 8px 2px #ff2a2a; }
  body.alarm.alarm-steady .monitor{
    box-shadow: inset 0 -8px 0 rgba(0,0,0,.08), 6px 10px 0 rgba(0,0,0,.12), 0 0 30px 4px rgba(220,20,20,.7);
  }
</style>
</head>

<div class="computer">

<script>
/* ============================================================
   TERMINAL CONFIGURATION — edit this to customize behavior
   ============================================================ */
const TERMINAL_CONFIG = {
  prompt: "Enter password:",        // text shown above the input line
  maskInput: false,                 // true -> show * instead of typed characters
  charDelay: 35,                    // ms per character when terminal "types"

  // Where to go on success. Leave as null to show the built-in
  // "ACCESS GRANTED" screen; set to a URL to redirect.
  // "ai" points to /ai in the same folder as this file.
  nextUrl: "main.html",

  // Called when the user presses Enter. Return an object describing
  // what should happen next:
  //   { action: "success" }                        -> success flow (nextUrl or built-in screen)
  //   { action: "redirect", url: "..." }           -> go straight to another page
  //   { action: "face", text: "..." }              -> pixel face animation, then re-prompt
  //   { action: "alarm", text: "..." }             -> emergency red-alert mode
  //   { action: "standdown", text: "..." }         -> cancel the alarm, re-prompt
  //   { action: "print", text: "...",              -> print text, then
  //     reprompt: true|false }                        optionally re-prompt
  // term.alarmOn tells you whether the alarm is currently active.
  onSubmit(input, term) {
    const v = input.trim().toLowerCase();

    if (v === "password") {
      return { action: "success" };
    }
    // let the user call off the alarm
    if (term.alarmOn && (v === "stand down" || v === "standdown" || v === "abort")) {
      return { action: "standdown", text: "STAND DOWN ACKNOWLEDGED.\nALARM DISENGAGED." };
    }
    // refusing to comply trips the alarm
    if (v === "no") {
      return { action: "alarm", text: this.alarmText };
    }
    return {
      action: "face",                   // play the pixel face animation
      text: "WRONG PASSWORD!",          // blinking caption under the face
    };
  },

  // Text typed out when access is granted
  successText: "ACCESS GRANTED.",

  // Filled in on the screen when the user refuses (types "no")
  alarmText:
"*** SECURITY ALERT ***\n" +
"\n" +
"User is refusing to enter password.\n" +
"Unauthorized intent detected.\n" +
"\n" +
"LOCKDOWN PROTOCOL ENGAGED\n" +
" > tracing connection ..... LOCATED\n" +
" > alerting administrator .. SENT\n" +
"\n" +
"This incident has been logged.\n" +
"\n" +
"Type STAND DOWN to abort,\n" +
"or enter the password to proceed.",

  // Angry pixel face, Jetsons-computer style.
  // '#' = lit pixel, '.' = off. Only the eyes change between
  // frames (open <-> squint); brows, nose, and mouth are static.
  angryFace: {
    frameMs: 220,        // time per animation frame
    durationMs: 2300,    // total time the face stays on screen
    frames: [
      [ // frame A — eyes open
        "..........................",
        "..###................###",
        "...###..............###",
        "....###............###",
        ".....###..........###",
        "",
        "....#####........#####",
        "...#.....#......#.....#",
        "...#..##.#......#.##..#",
        "...#.....#..##..#.....#",
        "....#####..####..#####",
        "...........####",
        "..........######",
        "..........######",
        "",
        "",
        "...####################",
        "....##################",
        "....###..###..###..###",
        ".....#....#....#....#",
      ],
      [ // frame B — eyes squint (everything else identical)
        "..........................",
        "..###................###",
        "...###..............###",
        "....###............###",
        ".....###..........###",
        "",
        "",
        "....#####........#####",
        "...#..##.#......#.##..#",
        "....#####...##...#####",
        "...........####",
        "...........####",
        "..........######",
        "..........######",
        "",
        "",
        "...####################",
        "....##################",
        "....###..###..###..###",
        ".....#....#....#....#",
      ],
    ],
  },
};
/* ============================================================ */

(function () {
  const output = document.getElementById("output");
  const screen = document.getElementById("screen");
  const kb     = document.getElementById("kb");
  const ledOk  = document.getElementById("led-ok");
  const ledWarn= document.getElementById("led-warn");

  let buffer = "";        // committed screen text
  let line   = "";        // raw current input line
  let accepting = false;  // is the terminal waiting for user input?
  let busy = false;       // terminal is "typing"
  let alarmOn = false;    // emergency alarm currently active?
  let alarmHoldTimer = null;

  function display() {
    const shown = TERMINAL_CONFIG.maskInput ? "*".repeat(line.length) : line;
    output.innerHTML = escapeHtml(buffer + "> " + shown) + '<span class="cursor"></span>';
    output.parentElement.scrollTop = output.parentElement.scrollHeight;
  }

  function escapeHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  // terminal "types" text character by character
  function typeOut(text, done, speed) {
    busy = true; accepting = false;
    const delay = speed || TERMINAL_CONFIG.charDelay;
    let i = 0;
    (function step(){
      if (i < text.length) {
        buffer += text[i++];
        output.innerHTML = escapeHtml(buffer) + '<span class="cursor"></span>';
        output.parentElement.scrollTop = output.parentElement.scrollHeight;
        setTimeout(step, delay);
      } else {
        busy = false;
        if (done) done();
      }
    })();
  }

  function promptUser() {
    typeOut(TERMINAL_CONFIG.prompt + "\n", () => {
      accepting = true;
      line = "";
      display();
    });
  }

  function blinkLed(led) {
    led.classList.add("lit");
    setTimeout(() => led.classList.remove("lit"), 900);
  }

  // shows text centered on the screen in slightly larger letters
  function showCenter(text, done) {
    accepting = false; busy = true;
    buffer = "";
    const safe = escapeHtml(text).replace(/\n/g, "<br>");
    output.innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100%;text-align:center;">' +
        '<div style="font-size:1.9em;letter-spacing:3px;line-height:1.3;">' + safe + '</div>' +
      '</div>';
    busy = false;
    if (done) done();
  }

  function submit() {
    accepting = false;
    const input = line;
    buffer += "> " + (TERMINAL_CONFIG.maskInput ? "*".repeat(line.length) : line) + "\n";
    line = "";

    const result = TERMINAL_CONFIG.onSubmit(input, { typeOut, promptUser, alarmOn });

    if (result.action === "success") {
      blinkLed(ledOk);
      showCenter(TERMINAL_CONFIG.successText || "ACCESS GRANTED.", () => {
        if (TERMINAL_CONFIG.nextUrl) {
          setTimeout(() => { window.location.href = TERMINAL_CONFIG.nextUrl; }, 1400);
        } else {
          setTimeout(showGrantedScreen, 1200);
        }
      });
    } else if (result.action === "redirect") {
      blinkLed(ledOk);
      typeOut((TERMINAL_CONFIG.successText || "OK.") + "\n", () => {
        setTimeout(() => { window.location.href = result.url; }, 700);
      });
    } else if (result.action === "alarm") {
      alarmOn = true;
      document.body.classList.add("alarm");
      document.body.classList.remove("alarm-steady");
      clearTimeout(alarmHoldTimer);
      // blare for a few seconds, then hold a steady (non-blinking) red
      alarmHoldTimer = setTimeout(() => {
        document.body.classList.add("alarm-steady");
      }, 4000);
      buffer = "";
      typeOut(result.text + "\n", () => {        // typed fast for urgency
        accepting = true;
        line = "";
        display();
      }, 12);
    } else if (result.action === "standdown") {
      alarmOn = false;
      clearTimeout(alarmHoldTimer);
      document.body.classList.remove("alarm", "alarm-steady");
      typeOut(result.text + "\n", () => {
        setTimeout(() => { buffer = ""; promptUser(); }, 900);
      });
    } else if (result.action === "face") {
      playFace(TERMINAL_CONFIG.angryFace, result.text, () => {
        buffer = "";
        promptUser();
      });
    } else if (result.action === "print") {
      blinkLed(ledWarn);
      typeOut(result.text + "\n", () => {
        const next = () => {
          if (result.reprompt) promptUser();
          else { accepting = true; display(); }
        };
        if (result.clearAfter) {
          setTimeout(() => { buffer = ""; next(); }, 1100);
        } else {
          buffer += "\n";
          next();
        }
      });
    }
  }

  // Draws the pixel face on a canvas overlay and animates it:
  // frames alternate, the whole face jitters like it's fuming,
  // and the caption blinks beneath it. Then it's removed.
  function playFace(face, caption, done) {
    busy = true; accepting = false;
    buffer = ""; output.innerHTML = "";

    const layer = output.parentElement;          // .phosphor-layer
    const w = layer.clientWidth, h = layer.clientHeight;
    const canvas = document.createElement("canvas");
    canvas.width = w; canvas.height = h;
    canvas.style.cssText = "position:absolute;inset:0;width:100%;height:100%;pointer-events:none;";
    layer.appendChild(canvas);
    const ctx = canvas.getContext("2d");

    const PIXEL = "#4ade60";
    const frames = face.frames;
    const cols = Math.max(...frames.flat().map(r => r.length));
    const rows = Math.max(...frames.map(f => f.length));
    const capH = caption ? 30 : 0;
    const cell = Math.max(2, Math.floor(Math.min(w / (cols + 2), (h - capH) / (rows + 2))));
    // fixed position so static features (nose, mouth, brows) don't move
    const ox = Math.floor((w - cols * cell) / 2);
    const oy = Math.floor((h - capH - rows * cell) / 2);

    let f = 0;
    function draw() {
      ctx.clearRect(0, 0, w, h);
      const grid = frames[f % frames.length];
      ctx.shadowColor = PIXEL;
      ctx.shadowBlur = 8;
      ctx.fillStyle = PIXEL;
      for (let y = 0; y < grid.length; y++) {
        const row = grid[y];
        for (let x = 0; x < row.length; x++) {
          const ch = row[x];
          if (ch === "." || ch === " " || ch === "") continue;
          ctx.fillRect(ox + x * cell, oy + y * cell, cell - 1, cell - 1);
        }
      }
      if (caption && f % 2 === 0) {            // blinking caption
        ctx.fillStyle = PIXEL;
        ctx.font = "bold 17px 'Courier New', monospace";
        ctx.textAlign = "center";
        ctx.fillText(caption, w / 2, h - 12);
      }
      ledWarn.classList.toggle("lit");          // warning LED pulses along
      f++;
    }

    draw();
    const iv = setInterval(draw, face.frameMs);
    setTimeout(() => {
      clearInterval(iv);
      canvas.remove();
      ledWarn.classList.remove("lit");
      busy = false;
      if (done) done();
    }, face.durationMs);
  }

  // built-in "next page" rendered on the CRT itself
  function showGrantedScreen() {
    accepting = false; busy = true;
    ledOk.classList.add("lit");
    output.innerHTML =
      '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;text-align:center;">' +
        '<div style="font-size:2.2em;letter-spacing:4px;">ACCESS<br>GRANTED</div>' +
        '<div style="opacity:.75">SYSTEM UNLOCKED &mdash; WELCOME, OPERATOR</div>' +
        '<div style="opacity:.55;font-size:.85em">[ press any key to log out ]</div>' +
      '</div>';
    // any key resets the terminal
    const reset = () => {
      document.removeEventListener("keydown", reset, true);
      screen.removeEventListener("click", reset, true);
      ledOk.classList.remove("lit");
      buffer = ""; line = ""; busy = false;
      promptUser();
    };
    setTimeout(() => {
      document.addEventListener("keydown", reset, true);
      screen.addEventListener("click", reset, true);
    }, 400);
  }

  function handleKey(key) {
    if (!accepting || busy) return;
    if (key === "Enter")            submit();
    else if (key === "Backspace")  { line = line.slice(0, -1); display(); }
    else if (key.length === 1)     { line += key; display(); }
  }

  // physical keyboard
  document.addEventListener("keydown", (e) => {
    if (["Enter","Backspace"].includes(e.key) || e.key.length === 1) {
      if (!e.ctrlKey && !e.metaKey) { e.preventDefault(); handleKey(e.key); }
    }
    pressVisualKey(e.key);
  });

  // focus hidden input on tap (brings up mobile keyboard)
  screen.addEventListener("click", () => kb.focus());
  // mobile keyboards often don't fire usable keydown events,
  // so feed whatever lands in the hidden input to the terminal
  kb.addEventListener("input", () => {
    for (const ch of kb.value) handleKey(ch);
    kb.value = "";
  });

  // on-screen keyboard: clickable + lights up with real keys
  const keyEls = document.querySelectorAll(".key");
  keyEls.forEach(el => {
    el.addEventListener("mousedown", () => {
      el.classList.add("pressed");
      handleKey(el.dataset.k === " " ? " " : el.dataset.k);
    });
    el.addEventListener("mouseup",    () => el.classList.remove("pressed"));
    el.addEventListener("mouseleave", () => el.classList.remove("pressed"));
  });

  function pressVisualKey(key) {
    const k = key.length === 1 ? key.toLowerCase() : key;
    keyEls.forEach(el => {
      if (el.dataset.k === k || (k === " " && el.dataset.k === " ")) {
        el.classList.add("pressed");
        setTimeout(() => el.classList.remove("pressed"), 120);
      }
    });
  }

  // boot
  promptUser();
})();
</script>
</body>
</html>
